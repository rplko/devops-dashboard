name: Deploy Pipeline — Staging → Step Functions

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install dockerode
        run: npm install dockerode

      - name: Start server in background
        run: node server.js &

      - name: Wait for server to be ready
        run: |
          for i in {1..10}; do
            curl -s http://localhost:3000/health && break
            echo "Waiting for server..."
            sleep 2
          done

      - name: Run tests
        run: npm test

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: staging
      url: http://44.222.215.213:3000

    env:
      EC2_HOST: ${{ secrets.STAGING_HOST }}
      EC2_USER: ${{ secrets.STAGING_USER }}
      SSH_KEY:  ${{ secrets.STAGING_SSH_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts

      - name: Deploy to staging server
        run: |
          ssh -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'EOF'
            set -e
            
            # Fix ownership first
            sudo chown -R ubuntu:ubuntu ~/devops-dashboard || true
            
            cd ~/devops-dashboard
            git fetch origin && git reset --hard origin/main
            
            export NODE_ENV=staging
            docker compose -f docker-compose.yml -f docker-compose.staging.yml down
            docker compose -f docker-compose.yml -f docker-compose.staging.yml build
            docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
            docker container prune -f
            
            echo "Staging deployment done."
          EOF

      - name: Health check — staging
        run: |
          sleep 20
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$EC2_HOST:3000/health)
            if [ "$STATUS" = "200" ]; then
              echo "Staging is healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i — got HTTP $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Staging health check failed after all retries"
          exit 1

  trigger-step-functions:
    name: Trigger Step Functions Pipeline
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create pending DC deployment on GitHub
        run: |
          DC_DEPLOYMENT_ID=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/deployments \
            -d "{\"ref\":\"${{ github.sha }}\",\"environment\":\"dc\",\"description\":\"DC deployment triggered by Step Functions\",\"auto_merge\":false,\"required_contexts\":[]}" \
            | jq -r '.id')
          echo "DC_DEPLOYMENT_ID=$DC_DEPLOYMENT_ID" >> $GITHUB_ENV
          echo "Created DC deployment: $DC_DEPLOYMENT_ID"

      - name: Mark DC deployment as queued
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/deployments/$DC_DEPLOYMENT_ID/statuses \
            -d '{"state":"queued","description":"Waiting for Step Functions approval"}'

      - name: Create pending Production deployment on GitHub
        run: |
          PROD_DEPLOYMENT_ID=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/deployments \
            -d "{\"ref\":\"${{ github.sha }}\",\"environment\":\"production\",\"description\":\"Production deployment triggered by Step Functions\",\"auto_merge\":false,\"required_contexts\":[]}" \
            | jq -r '.id')
          echo "PROD_DEPLOYMENT_ID=$PROD_DEPLOYMENT_ID" >> $GITHUB_ENV
          echo "Created Production deployment: $PROD_DEPLOYMENT_ID"

      - name: Mark Production deployment as queued
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/deployments/$PROD_DEPLOYMENT_ID/statuses \
            -d '{"state":"queued","description":"Waiting for Step Functions approval"}'

      - name: Start Step Functions execution
        run: |
          EXECUTION_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn arn:aws:states:us-east-1:029139774327:stateMachine:devops-dashboard-pipeline \
            --name "deploy-${{ github.sha }}-$(date +%s)" \
            --input "{\"commit\": \"${{ github.sha }}\", \"branch\": \"${{ github.ref_name }}\", \"triggered_by\": \"${{ github.actor }}\"}" \
            --query 'executionArn' \
            --output text)

          echo "EXECUTION_ARN=$EXECUTION_ARN" >> $GITHUB_ENV
          echo "Step Functions execution started successfully!"
          echo "Execution ARN: $EXECUTION_ARN"

      - name: Print monitoring link
        run: |
          echo "Monitor your pipeline here:"
          echo "https://us-east-1.console.aws.amazon.com/states/home?region=us-east-1#/executions/details/$EXECUTION_ARN"