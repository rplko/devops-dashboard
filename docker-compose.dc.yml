version: "3.9"

services:
  dashboard:
    environment:
      - NODE_ENV=dc
      - DEPLOY_COUNT=dc
    ports:
      - "3000:3000"
    restart: unless-stopped

  prometheus:
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.route-prefix=/prometheus"
      - "--web.external-url=http://98.92.57.61/prometheus"