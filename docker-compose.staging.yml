version: "3.9"

services:
  dashboard:
    environment:
      - NODE_ENV=staging
      - DEPLOY_COUNT=staging
    ports:
      - "3000:3000"
    restart: unless-stopped

  prometheus:
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.route-prefix=/prometheus"
      - "--web.external-url=http://44.222.215.213/prometheus"

  grafana:
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SERVER_ROOT_URL=http://44.222.215.213/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SERVER_PROTOCOL=http    